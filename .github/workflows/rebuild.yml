name: Rebuild Dashboard Data

on:
  repository_dispatch:
    types: [rebuild-data]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Excel from Supabase Storage
        run: |
          curl -L -o "IE Asset Data 2026.xlsx" \
            "https://zgypltdsqjhftnxadunu.supabase.co/storage/v1/object/public/asset-data/IE%20Asset%20Data%202026.xlsx"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard_data.js
        run: python build_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard data from Supabase"
            git push
          fi
